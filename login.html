<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1c1c1c;
padding:40px;
border-radius:15px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:white;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">
<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>
function login(){
alert("Logged in (demo)");
window.location.href = "dashboard.html";
}
</script>

</body>
</html>
